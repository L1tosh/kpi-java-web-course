services:
  db:
    image: postgres:15-alpine
    container_name: db_galactic_cats
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-galactic_cats}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-galactic_cats}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: app_space-cats-market
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: no-auth
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-galactic_cats}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: